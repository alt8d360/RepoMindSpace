<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - RepoMind Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 4rem auto;
        }
    </style>
    <script src="../js/theme.js"></script>
</head>

<body>
    <nav class="navbar container">
        <a href="../index.html" class="navbar-brand">RepoMind Space</a>
    </nav>

    <main class="container">
        <div class="auth-container card">
            <h2 class="text-center mb-4">Reset Password</h2>
            <p class="text-center text-muted mb-4">Enter your email address and we'll send you a link to reset your
                password.</p>
            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-control" required placeholder="name@example.com">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Send Reset Link</button>
            </form>
            <p class="text-center mt-4 text-muted">
                Remember your password? <a href="login.html">Log In</a>
            </p>
        </div>
    </main>

    <script src="../js/auth.js"></script>
</body>

</html>
