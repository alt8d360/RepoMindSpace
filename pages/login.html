<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RepoMind Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body style="padding: 0; background-color: #1e1b2e;">
    <div class="auth-split">
        <div class="auth-split-left">
            <div class="auth-header">
                <div>
                    <div class="auth-brand">RM SPACE</div>
                    <span class="version-text auth-version">Version 1.0</span>
                </div>
                <a href="../index.html" class="auth-back">Back to website &rarr;</a>
            </div>
            <div class="auth-hero-text">
                <h1>Capturing Intelligence,<br>Creating Repositories</h1>
                <div class="carousel-indicators" style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                    <div class="indicator"></div>
                    <div class="indicator"></div>
                    <div class="indicator"></div>
                </div>
            </div>
        </div>
        <div class="auth-split-right">
            <div class="auth-form-wrapper">
                <h2>Welcome Back</h2>
                <p class="auth-subtitle">Don't have an account? <a href="register.html" style="color: #a78bfa; text-decoration: underline;">Sign up</a></p>
                
                <form id="loginForm">
                    <div class="form-group">
                        <input type="email" id="email" class="form-control" required placeholder="Email">
                    </div>
                    <div class="form-group" style="position: relative;">
                        <input type="password" id="password" class="form-control" required placeholder="Enter your password">
                    </div>
                    <div class="form-group" style="display: flex; justify-content: space-between; font-size: 0.875rem;">
                        <label style="display: flex; align-items: center; gap: 0.5rem; color: var(--text-muted); cursor: pointer;">
                            <input type="checkbox" style="accent-color: #6366f1;"> Remember me
                        </label>
                        <a href="forgot-password.html" style="color: #a78bfa;">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary">Log in</button>
                </form>

                <div class="divider">Or log in with</div>
                <div class="social-login">
                    <button type="button" class="btn-social">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        Google
                    </button>
                    <button type="button" class="btn-social">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.05 2.26.74 3.08.77.92-.04 2.15-.84 3.65-.72 1.48.11 2.65.65 3.3 1.6-2.86 1.74-2.34 5.37.52 6.55-.68 1.83-1.6 3.65-2.55 4.77zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.32 2.37-1.88 4.34-3.74 4.25z"/></svg>
                        Apple
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/auth.js"></script>
</body>
</html>
