<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RepoMind Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        function handleGoogleResponse(response) {
            console.log("Google response received!", response.credential);
            fetch('http://localhost:5000/api/auth/google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ credential: response.credential })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.token) {
                        localStorage.setItem('token', data.token);
                        window.location.href = 'dashboard.html';
                    } else {
                        alert(data.error || 'Google login failed');
                    }
                })
                .catch(err => {
                    console.error('Error during Google Auth:', err);
                    alert('Failed to connect to backend server.');
                });
        }
    </script>
</head>

<body style="padding: 0; background-color: #1e1b2e;">
    <div class="auth-split">
        <div class="auth-split-left">
            <div class="auth-header">
                <div>
                    <div class="auth-brand">RM SPACE</div>
                    <span class="version-text auth-version">Version 1.0</span>
                </div>
                <a href="../index.html" class="auth-back">Back to website &rarr;</a>
            </div>
            <div class="auth-hero-text">
                <h1>Capturing Intelligence,<br>Creating Repositories</h1>
                <div class="carousel-indicators" style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                    <div class="indicator"></div>
                    <div class="indicator"></div>
                    <div class="indicator"></div>
                </div>
            </div>
        </div>
        <div class="auth-split-right">
            <div class="auth-form-wrapper">
                <h2>Welcome Back</h2>
                <p class="auth-subtitle">Don't have an account? <a href="register.html"
                        style="color: #a78bfa; text-decoration: underline;">Sign up</a></p>

                <form id="loginForm">
                    <div class="form-group">
                        <input type="email" id="email" class="form-control" required placeholder="Email">
                    </div>
                    <div class="form-group" style="position: relative;">
                        <input type="password" id="password" class="form-control" required
                            placeholder="Enter your password">
                    </div>
                    <div class="form-group" style="display: flex; justify-content: space-between; font-size: 0.875rem;">
                        <label
                            style="display: flex; align-items: center; gap: 0.5rem; color: var(--text-muted); cursor: pointer;">
                            <input type="checkbox" style="accent-color: #6366f1;"> Remember me
                        </label>
                        <a href="forgot-password.html" style="color: #a78bfa;">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary">Log in</button>
                </form>

                <div class="divider">Or log in with</div>
                <div class="social-login" style="justify-content: center;">
                    <div id="g_id_onload"
                        data-client_id="1091939061408-1rpl2tqd6tn2iulba1oo8v1cfh94t4bs.apps.googleusercontent.com"
                        data-context="signin" data-ux_mode="popup" data-callback="handleGoogleResponse"
                        data-auto_prompt="false">
                    </div>
                    <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="filled_black"
                        data-text="signin_with" data-size="large" data-logo_alignment="left" style="width: 100%;">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/auth.js"></script>
</body>

</html>
