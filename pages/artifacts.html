<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Artifacts - RepoMind Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .artifact-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        .artifact-table th, .artifact-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        .artifact-table th {
            font-weight: 600;
            color: var(--text-muted);
        }
        .artifact-table tr:hover {
            background-color: var(--bg-dark);
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <h2 class="navbar-brand mb-4">RepoMind Space</h2>
            <div class="mb-4" style="padding-bottom: 1rem; border-bottom: 1px solid var(--border-color);">
                <span class="text-muted" style="font-size: 0.75rem; text-transform: uppercase;">Current Workspace</span>
                <h3 style="font-size: 1.125rem;">E-Commerce API</h3>
            </div>
            <nav class="sidebar-nav" style="margin-top: 0;">
                <a href="workspace-detail.html" class="sidebar-link">Analysis Overview</a>
                <a href="generate-artifact.html" class="sidebar-link">Generate Artifacts</a>
                <a href="artifacts.html" class="sidebar-link active">Saved Artifacts</a>
                <a href="repository-chat.html" class="sidebar-link">Repository Chat</a>
            </nav>
            <nav class="sidebar-nav" style="margin-top: auto; padding-top: 2rem;">
                <a href="dashboard.html" class="sidebar-link">← Back to Dashboard</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="mb-4" style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1>Saved Artifacts</h1>
                    <p class="text-muted">Manage all generated documents and reports for this repository.</p>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <input type="text" class="form-control" placeholder="Search artifacts..." style="width: 250px;">
                </div>
            </header>

            <div class="card" style="padding: 0;">
                <table class="artifact-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Type</th>
                            <th>Generated Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="artifactsTableBody">
                        <!-- Artifact rows will be populated here dynamically -->
                        <tr>
                            <td colspan="4" class="text-center text-muted">No artifacts found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="../js/artifacts.js"></script>
</body>
</html>
