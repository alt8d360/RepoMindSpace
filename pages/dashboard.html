<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - RepoMind Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <h2 class="navbar-brand mb-4">RepoMind Space</h2>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="sidebar-link active">Dashboard</a>
                <a href="workspaces.html" class="sidebar-link">Workspaces</a>
                <a href="#" class="sidebar-link" id="logoutBtn">Logout</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="mb-4" style="display: flex; justify-content: space-between; align-items: center;">
                <h1>Dashboard Overview</h1>
                <a href="create-workspace.html" class="btn btn-primary">+ New Workspace</a>
            </header>

            <!-- Metrics Grid -->
            <div class="grid grid-cols-4 mb-4">
                <div class="card glow-card">
                    <h3 class="text-muted mb-1" style="font-size: 0.875rem;">Total Workspaces</h3>
                    <p class="metric-value mb-0">0</p>
                </div>
                <div class="card glow-card">
                    <h3 class="text-muted mb-1" style="font-size: 0.875rem;">Repos Processed</h3>
                    <p class="metric-value mb-0">0</p>
                </div>
                <div class="card glow-card">
                    <h3 class="text-muted mb-1" style="font-size: 0.875rem;">Generated Artifacts</h3>
                    <p class="metric-value mb-0">0</p>
                </div>
                <div class="card glow-card">
                    <h3 class="text-muted mb-1" style="font-size: 0.875rem;">Total Chats</h3>
                    <p class="metric-value mb-0">0</p>
                </div>
            </div>

            <!-- Recent Activity -->
            <section class="card">
                <h2 class="mb-4">Recent Activity</h2>
                <div class="grid" style="gap: 1rem;" id="recentActivityList">
                    <!-- Activity Items will be populated here dynamically -->
                    <p class="text-muted text-center" style="font-size: 0.875rem;">No recent activity.</p>
                </div>
            </section>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/workspace.js"></script>
</body>
</html>
