<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create an Account - RepoMind Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://accounts.google.com/gsi/client?onload=initGoogleAuth" async defer></script>
</head>
<body style="padding: 0; background-color: #1e1b2e;">
    <div class="auth-split">
        <div class="auth-split-left">
            <div class="auth-header">
                <div class="auth-brand">RM SPACE</div>
                <a href="../index.html" class="auth-back">Back to website &rarr;</a>
            </div>
            <div class="auth-hero-text">
                <h1>Capturing Intelligence,<br>Creating Repositories</h1>
                <div class="carousel-indicators" style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                    <div class="indicator active"></div>
                    <div class="indicator"></div>
                    <div class="indicator"></div>
                </div>
            </div>
        </div>
        <div class="auth-split-right">
            <div class="auth-form-wrapper">
                <h2>Create an account</h2>
                <p class="auth-subtitle">Already have an account? <a href="login.html" style="color: #a78bfa; text-decoration: underline;">Log in</a></p>
                
                <form id="registerForm">
                    <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                        <input type="text" id="firstName" class="form-control" required placeholder="First name">
                        <input type="text" id="lastName" class="form-control" required placeholder="Last name">
                    </div>
                    <div class="form-group">
                        <input type="email" id="email" class="form-control" required placeholder="Email">
                    </div>
                    <div class="form-group" style="position: relative;">
                        <input type="password" id="password" class="form-control" required placeholder="Enter your password">
                    </div>
                    <div class="form-group" style="display: flex; font-size: 0.875rem;">
                        <label style="display: flex; align-items: center; gap: 0.5rem; color: white; cursor: pointer;">
                            <input type="checkbox" style="accent-color: #6366f1;" required> I agree to the <a href="#" style="color: #a78bfa; text-decoration: underline;">Terms & Conditions</a>
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary">Create account</button>
                </form>

                <div class="divider">Or register with</div>
                <div class="social-login">
                    <button type="button" class="btn-social" id="googleSignUpBtn" style="width: 100%;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        Google
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/auth.js"></script>
</body>
</html>
