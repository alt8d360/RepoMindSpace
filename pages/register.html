<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - RepoMind Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 4rem auto;
        }
    </style>
</head>
<body>
    <nav class="navbar container">
        <a href="../index.html" class="navbar-brand">RepoMind Space</a>
    </nav>

    <main class="container">
        <div class="auth-container card">
            <h2 class="text-center mb-4">Create an Account</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-control" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign Up</button>
            </form>
            <p class="text-center mt-4 text-muted">
                Already have an account? <a href="login.html">Log In</a>
            </p>
        </div>
    </main>

    <script src="../js/auth.js"></script>
</body>
</html>
